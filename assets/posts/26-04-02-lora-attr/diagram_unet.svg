<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 450" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;family=Lato:wght@400;700&amp;display=swap');
      text {
        font-family: 'Lato', system-ui, -apple-system, sans-serif;
      }
      .accent {
        font-family: 'Fira Code', ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace;
      }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <marker id="arrowhead-grey" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#034638" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <!-- Unfrozen Box -->
  <rect x="370" y="100" width="410" height="280" rx="12" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6" opacity="0.8"/>
  <rect x="475" y="88" width="200" height="24" fill="#fafafa" />
  <text x="575" y="106" font-size="16" font-weight="700" fill="#475569" text-anchor="middle">Unfrozen; LoRA applied</text>

  <!-- Skip Connections -->
  <path d="M 140 135 L 712 135" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 230 165 L 622 165" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 330 190 L 522 190" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />

  <!-- Normal Flow -->
  <path d="M 50 220 L 92 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 140 220 L 172 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 230 220 L 262 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 330 220 L 392 220" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrowhead-grey)" />
  <path d="M 480 220 L 522 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 590 220 L 622 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 680 220 L 712 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />
  <path d="M 760 220 L 800 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead-grey)" />

  <!-- Cached Activations Flow -->
  <path d="M 300 260 L 300 315" stroke="#034638" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)" />
  <path d="M 320 350 L 440 350 L 440 248" stroke="#034638" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)" stroke-linejoin="round" />
  
  <text x="450" y="345" font-size="14" font-weight="500" fill="#034638" class="accent" text-anchor="start">reuse across ablations</text>

  <!-- Blocks -->
  <!-- E1 -->
  <rect x="100" y="120" width="40" height="200" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
  <g transform="translate(75, 150) scale(0.8)" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2v20 M3.3 7l17.4 10 M20.7 7l-17.4 10" />
    <polygon points="12,7 16.3,9.5 16.3,14.5 12,17 7.7,14.5 7.7,9.5" />
  </g>

  <!-- E2 -->
  <rect x="180" y="150" width="50" height="140" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
  <g transform="translate(155, 170) scale(0.8)" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2v20 M3.3 7l17.4 10 M20.7 7l-17.4 10" />
    <polygon points="12,7 16.3,9.5 16.3,14.5 12,17 7.7,14.5 7.7,9.5" />
  </g>

  <!-- E3 (Last Frozen) -->
  <rect x="270" y="180" width="60" height="80" rx="6" fill="#dbeafe" stroke="#ef4444" stroke-width="3" filter="url(#shadow)" />
  <g transform="translate(245, 190) scale(0.8)" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2v20 M3.3 7l17.4 10 M20.7 7l-17.4 10" />
    <polygon points="12,7 16.3,9.5 16.3,14.5 12,17 7.7,14.5 7.7,9.5" />
  </g>

  <!-- B1 -->
  <rect x="400" y="200" width="80" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />

  <!-- D1 -->
  <rect x="530" y="180" width="60" height="80" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />

  <!-- D2 -->
  <rect x="630" y="150" width="50" height="140" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />

  <!-- D3 -->
  <rect x="720" y="120" width="40" height="200" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)" />

  <!-- Storage Disk -->
  <g transform="translate(280, 325) scale(1.666)" stroke="#034638" stroke-width="1.5" fill="#d1e8e1" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
  </g>
  <text x="300" y="405" font-size="15" font-weight="700" fill="#1e293b" text-anchor="middle">Cached activations</text>

</svg>
